<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConsulFision - Gestão de Consultas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
        .animate-slideInRight { animation: slideInRight 0.3s ease-out forwards; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .grid-cols-16 { grid-template-columns: repeat(16, minmax(0, 1fr)); }
        
        /* Typing Animation */
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
        
        /* Markdown Styling */
        .markdown-body h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 1rem; text-transform: uppercase; color: #0f172a; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 800; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.25rem; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: 700; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #059669; display: flex; items-center: center; gap: 0.5rem; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.6; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .markdown-body li { margin-bottom: 0.5rem; }
        .markdown-body strong { font-weight: 700; color: #0f172a; }
        .markdown-body blockquote { border-left: 4px solid #10b981; padding-left: 1rem; font-style: italic; color: #475569; margin: 1.5rem 0; }
        
        /* Prescription Highlight - General H3 styling for clinical sections */
        .markdown-body h3 {
            background: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            color: #059669;
        }

        /* Force smaller icons globally */
        .lucide { width: 1rem !important; height: 1rem !important; stroke-width: 2.5px; }
        
        /* Compact density for mobile */
        @media (max-width: 768px) {
          html { font-size: 14px; }
          .p-4 { padding: 0.75rem !important; }
          .p-6 { padding: 1rem !important; }
          .p-8 { padding: 1.25rem !important; }
          .gap-4 { gap: 0.75rem !important; }
          .gap-6 { gap: 1rem !important; }
          .space-y-6 > :not([hidden]) ~ :not([hidden]) { margin-top: 1rem !important; }
          .space-y-4 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.75rem !important; }
        }

        /* Print Styles */
        @media print {
          body { background: white !important; color: black !important; }
          .print\:hidden { display: none !important; }
          .print\:block { display: block !important; }
          .print\:p-0 { padding: 0 !important; }
          .print\:m-0 { margin: 0 !important; }
          .print\:shadow-none { shadow: none !important; }
          .print\:border-none { border: none !important; }
          
          /* Page breaks */
          .break-inside-avoid { break-inside: avoid; }
          .page-break-before { page-break-before: always; }
          
          /* Specific for prescriptions */
          .prescription-print-only {
            background: white !important;
            border: 2px solid #e11d48 !important; /* rose-600 */
            padding: 2rem !important;
            margin-top: 2rem !important;
            border-radius: 1rem !important;
          }
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
